<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1a2845"/>
      <stop offset="100%" stop-color="#080c1a"/>
    </radialGradient>
    <filter id="hexGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="11" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="crownGlow" x="-22%" y="-22%" width="144%" height="144%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="dotGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle gold border -->
  <rect width="512" height="512" rx="108" fill="none"
        stroke="rgba(255,228,77,0.18)" stroke-width="4"/>

  <!-- GPS territory hexagon -->
  <polygon
    points="256,58 424,156 424,356 256,454 88,356 88,156"
    fill="rgba(255,228,77,0.09)"
    stroke="#FFE44D"
    stroke-width="17"
    stroke-linejoin="round"
    filter="url(#hexGlow)"
  />

  <!-- GPS waypoint dots at each vertex -->
  <!-- Top (start/end point) — brightest -->
  <circle cx="256" cy="58"  r="15" fill="#FFE44D" filter="url(#dotGlow)"/>
  <!-- Remaining vertices -->
  <circle cx="424" cy="156" r="10" fill="#FFE44D" opacity="0.72"/>
  <circle cx="424" cy="356" r="10" fill="#FFE44D" opacity="0.72"/>
  <circle cx="256" cy="454" r="10" fill="#FFE44D" opacity="0.72"/>
  <circle cx="88"  cy="356" r="10" fill="#FFE44D" opacity="0.72"/>
  <circle cx="88"  cy="156" r="10" fill="#FFE44D" opacity="0.72"/>

  <!-- ══ Crown (Kingdom / Dom) ══ -->
  <!-- Body: three prongs rising from base band -->
  <path
    d="M 148 358
       L 148 304
       L 188 304
       L 200 218
       L 226 266
       L 256 164
       L 286 266
       L 312 218
       L 324 304
       L 364 304
       L 364 358
       Z"
    fill="#FFE44D"
    filter="url(#crownGlow)"
  />
  <!-- Base band overlay — rounded bottom corners -->
  <rect x="148" y="304" width="216" height="54" rx="11" fill="#FFE44D"/>

  <!-- Cyan jewels on prong tips -->
  <!-- Center gem (top, tallest prong) -->
  <circle cx="256" cy="178" r="21" fill="#5BB4D8"/>
  <circle cx="253" cy="175" r="9"  fill="rgba(255,255,255,0.40)"/>
  <!-- Left gem -->
  <circle cx="200" cy="230" r="15" fill="#5BB4D8"/>
  <circle cx="198" cy="227" r="6"  fill="rgba(255,255,255,0.34)"/>
  <!-- Right gem -->
  <circle cx="312" cy="230" r="15" fill="#5BB4D8"/>
  <circle cx="310" cy="227" r="6"  fill="rgba(255,255,255,0.34)"/>

  <!-- Crown base band decorations (dark rivets) -->
  <circle cx="184" cy="331" r="9" fill="#0d1528"/>
  <circle cx="220" cy="331" r="9" fill="#0d1528"/>
  <circle cx="256" cy="331" r="9" fill="#0d1528"/>
  <circle cx="292" cy="331" r="9" fill="#0d1528"/>
  <circle cx="328" cy="331" r="9" fill="#0d1528"/>
</svg>
